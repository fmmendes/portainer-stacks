services:
  airflow-init:
    image: apache/airflow:latest-python3.14
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-fab==3.6.0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command:
      - bash
      - -c
      - >
          airflow db migrate &&
          airflow users create --username "${AIRFLOW_ADMIN_USER}" --password "${AIRFLOW_ADMIN_PASSWORD}" --firstname "${AIRFLOW_ADMIN_FIRSTNAME}" --lastname "${AIRFLOW_ADMIN_LASTNAME}" --role Admin --email "${AIRFLOW_ADMIN_EMAIL}"
    volumes:
      - /srv/airflow3/dags:/opt/airflow/dags
      - /srv/airflow3/logs:/opt/airflow/logs
      - /srv/airflow3/plugins:/opt/airflow/plugins
      - /srv/airflow3/config:/opt/airflow/config

  api-server:
    image: apache/airflow:latest-python3.14
    depends_on:
      - airflow-init
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-fab==3.6.0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    ports:
      - "8083:8080"
    command: api-server
    volumes:
      - /srv/airflow3/dags:/opt/airflow/dags
      - /srv/airflow3/logs:/opt/airflow/logs
      - /srv/airflow3/plugins:/opt/airflow/plugins
      - /srv/airflow3/config:/opt/airflow/config

  dag-processor:
    image: apache/airflow:latest-python3.14
    depends_on:
      - airflow-init
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-fab==3.6.0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: dag-processor
    volumes:
      - /srv/airflow3/dags:/opt/airflow/dags
      - /srv/airflow3/logs:/opt/airflow/logs
      - /srv/airflow3/plugins:/opt/airflow/plugins
      - /srv/airflow3/config:/opt/airflow/config

  scheduler:
    image: apache/airflow:latest-python3.14
    depends_on:
      - airflow-init
    environment:
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-fab==3.6.0
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: scheduler
    volumes:
      - /srv/airflow3/dags:/opt/airflow/dags
      - /srv/airflow3/logs:/opt/airflow/logs
      - /srv/airflow3/plugins:/opt/airflow/plugins
      - /srv/airflow3/config:/opt/airflow/config
