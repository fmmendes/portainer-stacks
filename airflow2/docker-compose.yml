services:
  airflow-init:
    image: apache/airflow:2.11.0-python3.12
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    entrypoint: >
      /bin/bash -c
      "airflow db migrate &&
       airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL}"
    volumes:
      - /srv/airflow2/dags:/opt/airflow/dags
      - /srv/airflow2/logs:/opt/airflow/logs
      - /srv/airflow2/plugins:/opt/airflow/plugins
      - /srv/airflow2/config:/opt/airflow/config

  webserver:
    image: apache/airflow:2.11.0-python3.12
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    ports:
      - "8082:8080"
    command: webserver
    volumes:
      - /srv/airflow2/dags:/opt/airflow/dags
      - /srv/airflow2/logs:/opt/airflow/logs
      - /srv/airflow2/plugins:/opt/airflow/plugins
      - /srv/airflow2/config:/opt/airflow/config

  scheduler:
    image: apache/airflow:2.11.0-python3.12
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}:5432/${POSTGRES_DB}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: scheduler
    volumes:
      - /srv/airflow2/dags:/opt/airflow/dags
      - /srv/airflow2/logs:/opt/airflow/logs
      - /srv/airflow2/plugins:/opt/airflow/plugins
      - /srv/airflow2/config:/opt/airflow/config
